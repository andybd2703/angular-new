<h2>CRUD de Usuarios</h2>

<input [(ngModel)]="nuevoUsuario.nombre" placeholder="Nombre">
<input [(ngModel)]="nuevoUsuario.correo" placeholder="Correo">

<button (click)="agregar()">
  {{ editingUsuario ? 'Guardar' : 'Agregar' }}
</button>

<!-- show cancel when editing -->
<button *ngIf="editingUsuario" (click)="cancelEdit()">
  Cancelar
</button>

<hr>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Correo</th>
        <th>Acciones</th>
    </tr>

    <tr *ngFor="let usuario of usuarios">
        <td>{{usuario.id}}</td>
        <td>{{usuario.nombre}}</td>
        <td>{{usuario.correo}}</td>
        <td>
            <button (click)="startEdit(usuario)">Editar</button>
            <button (click)="eliminar(usuario.id)">Eliminar</button>
        </td>
    </tr>

</table>
